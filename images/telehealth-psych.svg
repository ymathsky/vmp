<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" width="520" height="420">
  <!-- Background card -->
  <rect width="520" height="420" rx="24" fill="#F0F4F7"/>

  <!-- Laptop body -->
  <rect x="80" y="90" width="360" height="220" rx="16" fill="#005064"/>
  <rect x="96" y="106" width="328" height="188" rx="8" fill="#E9D5FF"/>

  <!-- Video call screen background -->
  <rect x="96" y="106" width="328" height="188" rx="8" fill="#1e1e2e"/>

  <!-- Doctor avatar on screen (left side) -->
  <rect x="110" y="120" width="140" height="160" rx="8" fill="#2d2d44"/>
  <!-- Doctor head -->
  <circle cx="180" cy="165" r="28" fill="#f4c89a"/>
  <!-- Doctor coat -->
  <rect x="152" y="192" width="56" height="50" rx="6" fill="white"/>
  <!-- Stethoscope hint -->
  <path d="M172 196 Q180 210 188 196" stroke="#008C8C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Doctor name tag -->
  <rect x="115" y="250" width="130" height="20" rx="4" fill="#008C8C"/>
  <text x="180" y="264" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="600">Dr. Psychiatrist</text>

  <!-- Patient avatar on screen (right side) -->
  <rect x="262" y="120" width="140" height="160" rx="8" fill="#2d2d44"/>
  <!-- Patient head -->
  <circle cx="332" cy="165" r="28" fill="#d4956a"/>
  <!-- Patient shirt -->
  <rect x="304" y="192" width="56" height="50" rx="6" fill="#57D131"/>
  <!-- Patient name tag -->
  <rect x="267" y="250" width="130" height="20" rx="4" fill="#4C3F58"/>
  <text x="332" y="264" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="600">Patient</text>

  <!-- Top bar of video call -->
  <rect x="96" y="106" width="328" height="14" rx="4" fill="#111122"/>
  <circle cx="112" cy="113" r="4" fill="#ff5f57"/>
  <circle cx="126" cy="113" r="4" fill="#febc2e"/>
  <circle cx="140" cy="113" r="4" fill="#28c840"/>
  <text x="260" y="117" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#aaa">Secure Telehealth Session &#128274;</text>

  <!-- Bottom bar with controls -->
  <rect x="96" y="282" width="328" height="12" rx="2" fill="#111122"/>
  <!-- Mic icon -->
  <circle cx="220" cy="288" r="5" fill="#008C8C"/>
  <!-- Camera icon -->
  <rect x="245" y="284" width="10" height="8" rx="2" fill="#57D131"/>
  <!-- End call icon -->
  <circle cx="280" cy="288" r="5" fill="#ff5f57"/>

  <!-- Laptop base -->
  <ellipse cx="260" cy="316" rx="200" ry="12" fill="#003a4a"/>
  <rect x="140" y="308" width="240" height="10" rx="2" fill="#004a5c"/>

  <!-- Floating badge: Confidential -->
  <rect x="330" y="60" width="140" height="36" rx="18" fill="#008C8C"/>
  <text x="400" y="82" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="white" font-weight="700">&#128274; Confidential</text>

  <!-- Floating badge: HIPAA -->
  <rect x="50" y="60" width="110" height="36" rx="18" fill="#57D131"/>
  <text x="105" y="82" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="white" font-weight="700">&#10003; HIPAA Secure</text>

  <!-- Bottom label -->
  <text x="260" y="380" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#4C3F58" font-weight="600">Virtual Psychiatric Consultation</text>
  <text x="260" y="400" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#008C8C">Connect from the comfort of your home</text>
</svg>
